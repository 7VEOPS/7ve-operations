<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CTRL DMX</title>
<style>
:root{
  --bg:#0b0b10;--s1:#131318;--s2:#1a1a22;--s3:#22222e;
  --border:#2c2c3c;--border2:#3a3a50;
  --accent:#e8c84a;--accent-dim:#b89a30;
  --red:#ff4455;--green:#3dff88;--blue:#4499ff;
  --amber:#ffaa33;--uv:#aa55ff;--white-col:#e8e8f2;
  --cyan:#33ddff;--magenta:#ff44cc;
  --text:#d8d8e8;--muted:#6868a8;--muted2:#555570;
  --radius:8px;--radius-lg:14px;
  --font:'SF Mono','Fira Code','Consolas',monospace;
  --sans:-apple-system,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);height:100%;overflow:hidden;font-size:14px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
#hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0}
#logo{font-family:var(--font);font-size:16px;font-weight:700;letter-spacing:.2em;color:var(--accent)}
#logo span{color:var(--muted2);font-weight:400;font-size:11px}
.spacer{flex:1}
#ws-dot{width:7px;height:7px;border-radius:50%;background:var(--muted2);flex-shrink:0;transition:background .3s}
#ws-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
#btn-bo{padding:8px 18px;border-radius:6px;border:2px solid var(--red);background:transparent;color:var(--red);font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .15s;flex-shrink:0}
#btn-bo.active{background:var(--red);color:#fff;box-shadow:0 0 20px var(--red)}

/* MASTER */
#mbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--border);flex-shrink:0}
.mlbl{font-size:9px;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap}
#msl{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none;cursor:pointer}
#msl::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);cursor:pointer}
#mpct{font-family:var(--font);font-size:12px;color:var(--amber);min-width:36px;text-align:right}

/* TABS */
#tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-size:11px;letter-spacing:.12em;cursor:pointer;white-space:nowrap;color:var(--muted2);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none;text-transform:uppercase}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* PANELS */
#panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;display:none;padding:14px;-webkit-overflow-scrolling:touch}
.panel.active{display:block}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* BUTTONS */
.btn{padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--s2);color:var(--text);font-family:var(--font);font-size:11px;cursor:pointer;transition:all .1s;white-space:nowrap;flex-shrink:0}
.btn.active,.btn:active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
.btn.sm{padding:5px 10px;font-size:10px}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:active{background:var(--red);color:#fff}

/* GROUP CARDS */
.grp-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden}
.grp-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;user-select:none}
.grp-name{font-size:13px;font-weight:600}
.grp-ct{font-size:10px;color:var(--muted2)}
.grp-body{padding:12px 14px;border-top:1px solid var(--border)}

/* DIMMER ROW */
.dim-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dim-sl{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none;cursor:pointer}
.dim-sl::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--amber);cursor:pointer}
.dim-v{font-family:var(--font);font-size:11px;color:var(--amber);min-width:28px;text-align:right}

/* COLOR CHANNEL ROWS */
.ch-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.ch-row{display:flex;align-items:center;gap:8px}
.ch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ch-lbl{font-size:10px;color:var(--muted2);min-width:18px}
.ch-sl{flex:1;-webkit-appearance:none;height:5px;border-radius:3px;background:var(--border);outline:none;cursor:pointer}
.ch-sl::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--s3);border:2px solid var(--border2);cursor:pointer}
.ch-sl.r::-webkit-slider-thumb{border-color:var(--red)}
.ch-sl.g::-webkit-slider-thumb{border-color:var(--green)}
.ch-sl.b::-webkit-slider-thumb{border-color:var(--blue)}
.ch-sl.a::-webkit-slider-thumb{border-color:var(--amber)}
.ch-sl.w::-webkit-slider-thumb{border-color:#e8e8f2}
.ch-sl.u::-webkit-slider-thumb{border-color:var(--uv)}
.ch-num{font-family:var(--font);font-size:10px;color:var(--muted2);min-width:26px;text-align:right}

/* COLOR WHEEL */
.cw-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:12px}
.cw-canvas{border-radius:50%;cursor:crosshair;touch-action:none;display:block}
.cw-brow{display:flex;align-items:center;gap:8px;width:100%}

/* PRESET BUTTONS */
.preset-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pbtn{padding:7px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:var(--sans);transition:transform .08s,opacity .1s;flex-shrink:0}
.pbtn:active{transform:scale(.92);opacity:.8}

/* MOVER PANEL */
.mtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.msec{display:none}
.msec.active{display:block}
.xy-outer{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap}
.xy-wrap{flex-shrink:0}
.xy-pad{width:200px;height:200px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--radius);touch-action:none;cursor:crosshair;position:relative;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:20px 20px}
.xy-ch{position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,.1);pointer-events:none}
.xy-cv{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.1);pointer-events:none}
.xy-cur{position:absolute;width:18px;height:18px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);transform:translate(-50%,-50%);pointer-events:none;border:2px solid rgba(255,255,255,.5)}
.xy-lbls{display:flex;justify-content:space-between;padding:0 4px;margin-top:4px}
.xy-l{font-size:9px;color:var(--muted2)}
.pos-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pos-btn{padding:7px 11px;border-radius:var(--radius);font-size:11px;background:var(--s2);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all .1s}
.pos-btn:active{background:var(--cyan);color:var(--bg);border-color:var(--cyan)}
.mch-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.mch-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.vfdr{-webkit-appearance:none;appearance:none;writing-mode:vertical-lr;direction:rtl;width:44px;height:120px;border-radius:4px;background:var(--border);outline:none;cursor:pointer}
.vfdr::-webkit-slider-thumb{-webkit-appearance:none;width:40px;height:18px;border-radius:4px;background:var(--s3);border:2px solid var(--border2);cursor:pointer}
.vfdr.dim::-webkit-slider-thumb{border-color:var(--amber)}
.vfdr.rgb::-webkit-slider-thumb{border-color:var(--cyan)}
.vfdr.spd::-webkit-slider-thumb{border-color:var(--green)}
.vfdr.sht::-webkit-slider-thumb{border-color:#e8e8f2}
.vfdr.gob::-webkit-slider-thumb{border-color:var(--magenta)}
.vfdr.prm::-webkit-slider-thumb{border-color:var(--uv)}
.vfdr.foc::-webkit-slider-thumb{border-color:var(--muted)}
.fdv{font-family:var(--font);font-size:10px;color:var(--text)}
.fdl{font-size:9px;color:var(--muted2);text-align:center;max-width:44px;word-break:break-word;line-height:1.2}

/* WHEEL BUTTONS */
.whl-sec{margin-top:14px}
.whl-title{font-size:10px;color:var(--muted2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.whl-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.wbtn{padding:5px 10px;border-radius:5px;font-size:10px;background:var(--s2);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all .1s}
.wbtn:active,.wbtn.sel{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}

/* FIXTURE CARDS */
.fix-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden}
.fix-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none}
.fix-name{font-size:13px;font-weight:600}
.fix-meta{font-size:10px;color:var(--muted2)}
.fix-badge{font-size:9px;padding:2px 8px;border-radius:20px;background:var(--s3);border:1px solid var(--border);color:var(--muted2)}
.fix-body{padding:12px 14px;border-top:1px solid var(--border);display:none}
.fix-body.open{display:block}
.fix-chs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}

/* SCENES */
.save-row{display:flex;gap:8px;margin-bottom:16px}
#sinp{flex:1;background:var(--s1);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-family:var(--sans);font-size:13px}
#sinp:focus{outline:none;border-color:var(--accent)}
.scene-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.sc-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:border-color .15s}
.sc-card:active{border-color:var(--accent)}
.sc-nm{font-size:13px;font-weight:600;margin-bottom:4px}
.sc-ts{font-size:10px;color:var(--muted2);margin-bottom:10px}
.sc-acts{display:flex;gap:6px}

/* PATCH */
.pt{width:100%;border-collapse:collapse;font-size:12px}
.pt th{text-align:left;padding:8px 10px;font-size:10px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:600}
.pt td{padding:7px 10px;border-bottom:1px solid var(--border)}
.pt tr:last-child td{border-bottom:none}
.pt tr:hover td{background:var(--s2)}
.pi{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;font-family:var(--font);font-size:11px;width:60px}
.pi:focus{outline:none;border-color:var(--accent)}
.ps{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:5px;font-size:11px}
.arow{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.ai{flex:1;background:var(--s1);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-family:var(--font);font-size:12px;min-width:180px}
.ai:focus{outline:none;border-color:var(--accent)}
.sec-hdr{font-size:10px;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:20px;font-size:12px;transition:transform .2s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div id="logo">CTRL <span>DMX</span></div>
  <div class="spacer"></div>
  <div id="ws-dot"></div>
  <button id="btn-bo">⬛ BLACKOUT</button>
</div>
<div id="mbar">
  <div class="mlbl">MASTER</div>
  <input type="range" id="msl" min="0" max="255" value="255">
  <div id="mpct">100%</div>
</div>
<div id="tabs">
  <div class="tab active" data-tab="groups">GROUPS</div>
  <div class="tab" data-tab="movers">MOVERS</div>
  <div class="tab" data-tab="fixtures">FIXTURES</div>
  <div class="tab" data-tab="scenes">SCENES</div>
  <div class="tab" data-tab="patch">PATCH</div>
</div>
<div id="panels">
  <div class="panel active" id="p-groups"></div>
  <div class="panel" id="p-movers">
    <div class="mtabs" id="mtabs"></div>
    <div id="msecs"></div>
  </div>
  <div class="panel" id="p-fixtures"></div>
  <div class="panel" id="p-scenes">
    <div class="save-row">
      <input type="text" id="sinp" placeholder="Scene name…">
      <button class="btn" id="bss">SAVE</button>
    </div>
    <div class="scene-grid" id="sgrid"></div>
  </div>
  <div class="panel" id="p-patch">
    <div class="sec-hdr">Art-Net Target</div>
    <div class="arow">
      <input class="ai" id="aip" placeholder="192.168.1.x or 2.255.255.255">
      <button class="btn" id="bans">SAVE</button>
    </div>
    <div class="sec-hdr">
      Fixture Patch
      <button class="btn sm" id="bpa">APPLY ALL</button>
    </div>
    <div style="overflow-x:auto">
      <table class="pt">
        <thead><tr><th>#</th><th>Name</th><th>Type</th><th>Univ</th><th>Addr</th><th>Mode</th><th>Ch</th></tr></thead>
        <tbody id="ptbody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>
<div id="toast"></div>
<script>

},

function setFix(fid,vals){
  if(ST[fid])vals.forEach((v,i)=>{if(v!=null)ST[fid][i]=v});
  ws({type:'fixture',fixtureId:fid,values:vals});
}
function setGrpType(gid,typ,v){
  const g=GROUPS.find(x=>x.id===gid);if(!g)return;
  g.ids.forEach(fid=>{
    const p=PATCH.find(x=>x.id===fid);if(!p)return;
    getChs(p).forEach((c,i)=>{if(c.t===typ&&ST[fid])ST[fid][i]=v});
    ws({type:'fixtureType',fixtureId:fid,channelType:typ,value:v});
  });
}
function setGrpColor(gid,col){
  const g=GROUPS.find(x=>x.id===gid);if(!g)return;
  g.ids.forEach(fid=>{
    const p=PATCH.find(x=>x.id===fid);if(!p)return;
    const chs=getChs(p);
    const vals=Array.from(ST[fid]||[]);
    chs.forEach((c,i)=>{
      if(c.t==='red')vals[i]=col.r;
      if(c.t==='grn')vals[i]=col.g;
      if(c.t==='blu')vals[i]=col.b;
      if(c.t==='amb')vals[i]=col.a;
      if(c.t==='wht')vals[i]=col.w;
      if(c.t==='uv') vals[i]=col.uv;
    });
    setFix(fid,vals);
  });
}

// ─── COLOR WHEEL UTIL ─────────────────────────────────────────
function drawWheel(cvs,brt){
  const ctx=cvs.getContext('2d'),s=cvs.width,cx=s/2,cy=s/2,r=s/2-1;
  ctx.clearRect(0,0,s,s);
  for(let a=0;a<360;a+=1){
    const rad=a*(Math.PI/180);
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,`hsla(${a},0%,${Math.round(brt*100)}%,1)`);
    g.addColorStop(1,`hsla(${a},100%,${Math.round(brt*50)}%,1)`);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,rad-.02,rad+.02);ctx.closePath();
    ctx.fillStyle=g;ctx.fill();
  }
}
function wheelRGB(x,y,s,b){
  const cx=s/2,cy=s/2,dx=x-cx,dy=y-cy,r=s/2;
  const d=Math.sqrt(dx*dx+dy*dy)/r;if(d>1)return null;
  const h=(Math.atan2(dy,dx)*180/Math.PI+360)%360,sat=d;
  const c=b*sat,xc=c*(1-Math.abs((h/60)%2-1)),m=b-c;
  let ri=0,gi=0,bi=0;
  if(h<60){ri=c;gi=xc}else if(h<120){ri=xc;gi=c}else if(h<180){gi=c;bi=xc}
  else if(h<240){gi=xc;bi=c}else if(h<300){ri=xc;bi=c}else{ri=c;bi=xc}
  return{r:Math.round((ri+m)*255),g:Math.round((gi+m)*255),b:Math.round((bi+m)*255)};
}

function buildGroups(){
  const el=document.getElementById('p-groups');el.innerHTML='';
  GROUPS.forEach(grp=>{
    const samp=PATCH.find(p=>grp.ids.includes(p.id));if(!samp)return;
    const allChs=grp.ids.flatMap(id=>{const p=PATCH.find(x=>x.id===id);return p?getChs(p):[]});
    const has=t=>allChs.some(c=>c.t===t);
    const hasDim=has('dim'),hasRGB=has('red')||has('grn')||has('blu'),
          hasA=has('amb'),hasW=has('wht'),hasUV=has('uv');

    const card=document.createElement('div');card.className='grp-card';
    const hdr=document.createElement('div');hdr.className='grp-hdr';
    hdr.innerHTML=`<div class="grp-name">${grp.name}</div><div class="grp-ct">${grp.ids.length} fixtures ▾</div>`;
    const body=document.createElement('div');body.className='grp-body';body.style.display='none';
    hdr.addEventListener('click',()=>body.style.display=body.style.display==='none'?'block':'none');

    // Dimmer
    if(hasDim){
      const r=document.createElement('div');r.className='dim-row';
      r.innerHTML=`<span class="mlbl">DIM</span>
        <input type="range" class="dim-sl" min="0" max="255" value="0" id="gd-${grp.id}">
        <span class="dim-v" id="gdv-${grp.id}">0</span>`;
      body.appendChild(r);
    }

    // RGBAWUV sliders
    if(hasRGB||hasA||hasW||hasUV){
      const rows=document.createElement('div');rows.className='ch-rows';
      const cols=[
        {t:'red',cl:'r',dot:'#ff4455',lbl:'R'},
        {t:'grn',cl:'g',dot:'#3dff88',lbl:'G'},
        {t:'blu',cl:'b',dot:'#4499ff',lbl:'B'},
      ];
      if(hasA) cols.push({t:'amb',cl:'a',dot:'#ffaa33',lbl:'A'});
      if(hasW) cols.push({t:'wht',cl:'w',dot:'#e8e8f2',lbl:'W'});
      if(hasUV)cols.push({t:'uv', cl:'u',dot:'#aa55ff',lbl:'UV'});
      cols.forEach(col=>{
        const r=document.createElement('div');r.className='ch-row';
        r.innerHTML=`<div class="ch-dot" style="background:${col.dot}"></div>
          <span class="ch-lbl">${col.lbl}</span>
          <input type="range" class="ch-sl ${col.cl}" min="0" max="255" value="0" data-gid="${grp.id}" data-ct="${col.t}">
          <span class="ch-num" id="gcn-${grp.id}-${col.t}">0</span>`;
        rows.appendChild(r);
      });
      body.appendChild(rows);

      // Color wheel
      const cws=Math.min(window.innerWidth-56,200);
      const cwDiv=document.createElement('div');cwDiv.className='cw-wrap';
      const cvs=document.createElement('canvas');
      cvs.className='cw-canvas';cvs.width=cws;cvs.height=cws;
      let cwb=1;drawWheel(cvs,cwb);

      const brow=document.createElement('div');brow.className='cw-brow';
      brow.innerHTML=`<span class="ch-lbl" style="min-width:30px">BRT</span>
        <input type="range" class="ch-sl" min="1" max="100" value="100" id="cwb-${grp.id}">`;
      brow.querySelector('input').addEventListener('input',function(){
        cwb=parseInt(this.value)/100;drawWheel(cvs,cwb);
      });

      function pickColor(ex,ey){
        const rc=cvs.getBoundingClientRect();
        const rgb=wheelRGB(ex-rc.left,ey-rc.top,cws,cwb);if(!rgb)return;
        ['red','grn','blu'].forEach((t,i)=>{
          const v=[rgb.r,rgb.g,rgb.b][i];
          const sl=body.querySelector(`.ch-sl[data-ct="${t}"]`);
          const nm=body.querySelector(`#gcn-${grp.id}-${t}`);
          if(sl){sl.value=v;if(nm)nm.textContent=v}
          setGrpType(grp.id,t,v);
        });
        // auto-bump dimmer
        const ds=document.getElementById('gd-'+grp.id);
        if(ds&&parseInt(ds.value)===0){ds.value=255;const dv=document.getElementById('gdv-'+grp.id);if(dv)dv.textContent=255;setGrpType(grp.id,'dim',255);}
      }
      cvs.addEventListener('touchstart',e=>{e.preventDefault();pickColor(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
      cvs.addEventListener('touchmove', e=>{e.preventDefault();pickColor(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
      cvs.addEventListener('mousedown', e=>pickColor(e.clientX,e.clientY));
      cvs.addEventListener('mousemove', e=>{if(e.buttons===1)pickColor(e.clientX,e.clientY)});
      cwDiv.appendChild(cvs);cwDiv.appendChild(brow);
      body.appendChild(cwDiv);
    }

    // Color presets
    const pg=document.createElement('div');pg.className='preset-grid';
    COLORS.forEach(cp=>{
      const btn=document.createElement('button');btn.className='pbtn';
      btn.style.background=cp.bg;btn.style.color=cp.fg;btn.textContent=cp.n;
      btn.addEventListener('click',()=>{
        setGrpColor(grp.id,{r:cp.r,g:cp.g,b:cp.b,a:cp.a,w:cp.w,uv:cp.uv});
        // sync sliders
        const ctMap={red:cp.r,grn:cp.g,blu:cp.b,amb:cp.a,wht:cp.w,uv:cp.uv};
        for(const[t,v] of Object.entries(ctMap)){
          const sl=body.querySelector(`.ch-sl[data-ct="${t}"]`);
          const nm=body.querySelector(`#gcn-${grp.id}-${t}`);
          if(sl){sl.value=v;if(nm)nm.textContent=v}
        }
        if(cp.r+cp.g+cp.b+cp.a+cp.w+cp.uv>0){
          const ds=document.getElementById('gd-'+grp.id);
          if(ds&&parseInt(ds.value)===0){ds.value=255;const dv=document.getElementById('gdv-'+grp.id);if(dv)dv.textContent=255;setGrpType(grp.id,'dim',255);}
        }
        toast(grp.name+' → '+cp.n);
      });
      pg.appendChild(btn);
    });
    body.appendChild(pg);

    card.appendChild(hdr);card.appendChild(body);
    el.appendChild(card);
  });

  el.querySelectorAll('.dim-sl').forEach(sl=>{
    sl.addEventListener('input',()=>{
      const gid=sl.id.replace('gd-',''),v=parseInt(sl.value);
      const dv=document.getElementById('gdv-'+gid);if(dv)dv.textContent=v;
      setGrpType(gid,'dim',v);
    });
  });
  el.querySelectorAll('.ch-sl[data-gid]').forEach(sl=>{
    sl.addEventListener('input',()=>{
      const gid=sl.dataset.gid,ct=sl.dataset.ct,v=parseInt(sl.value);
      const nm=el.querySelector('#gcn-'+gid+'-'+ct);if(nm)nm.textContent=v;
      setGrpType(gid,ct,v);
    });
  });
}

function buildMovers(){
  const tabsEl=document.getElementById('mtabs'),secsEl=document.getElementById('msecs');
  tabsEl.innerHTML='';secsEl.innerHTML='';
  const movers=PATCH.filter(p=>getChs(p).some(c=>c.t==='pan')&&getChs(p).some(c=>c.t==='tlt'));
  movers.forEach((p,idx)=>{
    const td=FX[p.type],chs=getChs(p);
    const pi=chs.findIndex(c=>c.t==='pan'),ti=chs.findIndex(c=>c.t==='tlt');

    const tb=document.createElement('button');
    tb.className='btn'+(idx===0?' active':'');tb.textContent=p.label;
    tb.addEventListener('click',()=>{
      tabsEl.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
      secsEl.querySelectorAll('.msec').forEach(s=>s.classList.remove('active'));
      tb.classList.add('active');
      document.getElementById('ms-'+p.id).classList.add('active');
    });
    tabsEl.appendChild(tb);

    const sec=document.createElement('div');sec.className='msec'+(idx===0?' active':'');sec.id='ms-'+p.id;
    const meta=document.createElement('div');
    meta.style.cssText='font-size:11px;color:var(--muted2);margin-bottom:12px';
    meta.textContent=td.name+' — U'+p.univ+' A'+p.addr;
    sec.appendChild(meta);

    // XY Pad
    const xyo=document.createElement('div');xyo.className='xy-outer';
    const xyw=document.createElement('div');xyw.className='xy-wrap';
    const pad=document.createElement('div');pad.className='xy-pad';
    pad.appendChild(Object.assign(document.createElement('div'),{className:'xy-ch'}));
    pad.appendChild(Object.assign(document.createElement('div'),{className:'xy-cv'}));
    const cur=document.createElement('div');cur.className='xy-cur';cur.id='cur-'+p.id;
    const pv=ST[p.id]?.[pi]??128,tv=ST[p.id]?.[ti]??128;
    cur.style.left=(pv/255*100)+'%';cur.style.top=((255-tv)/255*100)+'%';
    pad.appendChild(cur);

    function moveXY(cx,cy){
      const rc=pad.getBoundingClientRect();
      const x=Math.max(0,Math.min(1,(cx-rc.left)/rc.width));
      const y=Math.max(0,Math.min(1,(cy-rc.top)/rc.height));
      const pn=Math.round(x*255),tn=Math.round((1-y)*255);
      cur.style.left=(x*100)+'%';cur.style.top=(y*100)+'%';
      setDMX(p.id,pi,pn);setDMX(p.id,ti,tn);
      const pf=document.getElementById('mf-'+p.id+'-'+pi);
      const tf=document.getElementById('mf-'+p.id+'-'+ti);
      if(pf)pf.value=pn;if(tf)tf.value=tn;
      document.getElementById('mv-'+p.id+'-'+pi)&&(document.getElementById('mv-'+p.id+'-'+pi).textContent=pn);
      document.getElementById('mv-'+p.id+'-'+ti)&&(document.getElementById('mv-'+p.id+'-'+ti).textContent=tn);
    }
    pad.addEventListener('touchstart',e=>{e.preventDefault();moveXY(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
    pad.addEventListener('touchmove', e=>{e.preventDefault();moveXY(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
    pad.addEventListener('mousedown', e=>moveXY(e.clientX,e.clientY));
    pad.addEventListener('mousemove', e=>{if(e.buttons===1)moveXY(e.clientX,e.clientY)});

    const xlbls=document.createElement('div');xlbls.className='xy-lbls';
    xlbls.innerHTML='<span class="xy-l">← PAN →</span><span class="xy-l">↑ TILT ↓</span>';
    xyw.appendChild(pad);xyw.appendChild(xlbls);xyo.appendChild(xyw);

    // Position presets
    if(td.positions){
      const pw=document.createElement('div');pw.style.cssText='display:flex;flex-direction:column;gap:8px';
      const pt=document.createElement('div');pt.style.cssText='font-size:9px;color:var(--muted2);letter-spacing:.12em;text-transform:uppercase';
      pt.textContent='POSITION PRESETS';
      const pg=document.createElement('div');pg.className='pos-grid';pg.style.marginTop='6px';
      td.positions.forEach(pos=>{
        const b=document.createElement('button');b.className='pos-btn';b.textContent=pos.n;
        b.addEventListener('click',()=>{
          setDMX(p.id,pi,pos.p);setDMX(p.id,ti,pos.t);
          cur.style.left=(pos.p/255*100)+'%';cur.style.top=((255-pos.t)/255*100)+'%';
          const pf=document.getElementById('mf-'+p.id+'-'+pi);
          const tf=document.getElementById('mf-'+p.id+'-'+ti);
          if(pf)pf.value=pos.p;if(tf)tf.value=pos.t;
          document.getElementById('mv-'+p.id+'-'+pi)&&(document.getElementById('mv-'+p.id+'-'+pi).textContent=pos.p);
          document.getElementById('mv-'+p.id+'-'+ti)&&(document.getElementById('mv-'+p.id+'-'+ti).textContent=pos.t);
        });
        pg.appendChild(b);
      });
      pw.appendChild(pt);pw.appendChild(pg);xyo.appendChild(pw);
    }
    sec.appendChild(xyo);

    // Channel faders
    const cr=document.createElement('div');cr.className='mch-row';
    chs.forEach((ch,ci)=>{
      const cl=ch.t==='dim'?'dim':['red','grn','blu','amb','wht','uv'].includes(ch.t)?'rgb':['spd','spd2'].includes(ch.t)?'spd':ch.t==='sht'?'sht':ch.t.startsWith('gob')?'gob':ch.t==='prm'?'prm':ch.t==='foc'?'foc':'';
      const def=ST[p.id]?.[ci]??ch.def??0;
      const col=document.createElement('div');col.className='mch-col';
      col.innerHTML=`<div class="fdv" id="mv-${p.id}-${ci}">${def}</div>
        <input type="range" class="vfdr ${cl}" id="mf-${p.id}-${ci}" data-pid="${p.id}" data-ci="${ci}"
          min="0" max="255" value="${def}" title="${ch.info||ch.n}">
        <div class="fdl">${ch.n}</div>`;
      cr.appendChild(col);
    });
    sec.appendChild(cr);

    // MAC 250 wheel buttons
    if(p.type==='mac250e'){
      const mw=document.createElement('div');mw.className='whl-sec';
      const colIdx=chs.findIndex(c=>c.t==='col');
      const gobIdx=chs.findIndex(c=>c.t==='gob');
      const gob2Idx=chs.findIndex(c=>c.t==='gob2');
      function makeWheelSection(title,items,chIdx){
        if(chIdx<0)return;
        const t=document.createElement('div');t.className='whl-title';t.textContent=title;
        const g=document.createElement('div');g.className='whl-grid';
        items.forEach(it=>{
          const b=document.createElement('button');b.className='wbtn';b.textContent=it.n;
          b.addEventListener('click',()=>{
            g.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('sel'));
            b.classList.add('sel');
            setDMX(p.id,chIdx,it.v);
            const f=document.getElementById('mf-'+p.id+'-'+chIdx);
            const v=document.getElementById('mv-'+p.id+'-'+chIdx);
            if(f)f.value=it.v;if(v)v.textContent=it.v;
          });
          g.appendChild(b);
        });
        mw.appendChild(t);mw.appendChild(g);
      }
      makeWheelSection('COLOR WHEEL',td.cwheel,colIdx);
      makeWheelSection('ROTATING GOBOS',td.gobos,gobIdx);
      makeWheelSection('FIXED GOBOS',td.gobos2,gob2Idx);
      sec.appendChild(mw);
    }

    secsEl.appendChild(sec);
  });

  secsEl.querySelectorAll('.vfdr').forEach(sl=>{
    sl.addEventListener('input',()=>{
      const pid=sl.dataset.pid,ci=parseInt(sl.dataset.ci),v=parseInt(sl.value);
      const lbl=document.getElementById('mv-'+pid+'-'+ci);if(lbl)lbl.textContent=v;
      setDMX(pid,ci,v);
      // sync XY
      const p=PATCH.find(x=>x.id===pid);if(!p)return;
      const chs=getChs(p),pi=chs.findIndex(c=>c.t==='pan'),ti=chs.findIndex(c=>c.t==='tlt');
      if(ci===pi||ci===ti){
        const c=document.getElementById('cur-'+pid);if(!c)return;
        const pv=parseInt(document.getElementById('mf-'+pid+'-'+pi)?.value??128);
        const tv=parseInt(document.getElementById('mf-'+pid+'-'+ti)?.value??128);
        c.style.left=(pv/255*100)+'%';c.style.top=((255-tv)/255*100)+'%';
      }
    });
  });
}

// ─── BUILD FIXTURES ───────────────────────────────────────────
function buildFixtures(){
  const el=document.getElementById('p-fixtures');el.innerHTML='';
  PATCH.forEach(p=>{
    const td=FX[p.type],chs=getChs(p);
    const card=document.createElement('div');card.className='fix-card';
    const hdr=document.createElement('div');hdr.className='fix-hdr';
    hdr.innerHTML=`<div><div class="fix-name">${p.label}</div><div class="fix-meta">U${p.univ} · A${p.addr} · ${chs.length}ch</div></div>
      <div class="fix-badge">${td.short}</div>`;
    const body=document.createElement('div');body.className='fix-body';
    hdr.addEventListener('click',()=>body.classList.toggle('open'));

    const chsDiv=document.createElement('div');chsDiv.className='fix-chs';
    chs.forEach((ch,ci)=>{
      const cl=ch.t==='dim'?'dim':['red','grn','blu','amb','wht','uv'].includes(ch.t)?'rgb':['spd','spd2'].includes(ch.t)?'spd':ch.t==='sht'?'sht':ch.t.startsWith('gob')?'gob':ch.t==='prm'?'prm':ch.t==='foc'?'foc':'';
      const def=ST[p.id]?.[ci]??ch.def??0;
      const col=document.createElement('div');col.className='mch-col';
      col.innerHTML=`<div class="fdv" id="fv-${p.id}-${ci}">${def}</div>
        <input type="range" class="vfdr ${cl}" data-pid="${p.id}" data-ci="${ci}"
          min="0" max="255" value="${def}" title="${ch.info||ch.n}">
        <div class="fdl">${ch.n}</div>`;
      chsDiv.appendChild(col);
    });
    body.appendChild(chsDiv);

    // Color presets if applicable
    if(chs.some(c=>c.t==='red'||c.t==='grn'||c.t==='blu')){
      const pg=document.createElement('div');pg.className='preset-grid';pg.style.marginTop='8px';
      COLORS.forEach(cp=>{
        const btn=document.createElement('button');btn.className='pbtn';
        btn.style.cssText=`background:${cp.bg};color:${cp.fg};padding:5px 9px;font-size:10px`;
        btn.textContent=cp.n;
        btn.addEventListener('click',()=>{
          const vals=Array.from(ST[p.id]);
          chs.forEach((ch,i)=>{
            if(ch.t==='red')vals[i]=cp.r;if(ch.t==='grn')vals[i]=cp.g;
            if(ch.t==='blu')vals[i]=cp.b;if(ch.t==='amb')vals[i]=cp.a;
            if(ch.t==='wht')vals[i]=cp.w;if(ch.t==='uv') vals[i]=cp.uv;
          });
          setFix(p.id,vals);
          vals.forEach((v,i)=>{const f=document.getElementById('fv-'+p.id+'-'+i);if(f)f.textContent=v});
        });
        pg.appendChild(btn);
      });
      body.appendChild(pg);
    }

    card.appendChild(hdr);card.appendChild(body);el.appendChild(card);
  });
  el.querySelectorAll('.vfdr[data-pid]').forEach(sl=>{
    sl.addEventListener('input',()=>{
      const pid=sl.dataset.pid,ci=parseInt(sl.dataset.ci),v=parseInt(sl.value);
      const lbl=document.getElementById('fv-'+pid+'-'+ci);if(lbl)lbl.textContent=v;
      setDMX(pid,ci,v);
    });
  });
}

// ─── SCENES ───────────────────────────────────────────────────
function saveScenes(){localStorage.setItem('dmx_scenes',JSON.stringify(scenes))}
function renderScenes(){
  const g=document.getElementById('sgrid');g.innerHTML='';
  if(!scenes.length){g.innerHTML='<div style="color:var(--muted2);font-size:12px">No scenes yet.</div>';return}
  scenes.forEach((s,i)=>{
    const c=document.createElement('div');c.className='sc-card';
    const d=new Date(s.ts);
    c.innerHTML=`<div class="sc-nm">${s.name}</div>
      <div class="sc-ts">${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="sc-acts">
        <button class="btn sm" data-i="${i}" data-a="go">GO</button>
        <button class="btn sm" data-i="${i}" data-a="upd">UPD</button>
        <button class="btn sm danger" data-i="${i}" data-a="del">DEL</button>
      </div>`;
    g.appendChild(c);
  });
  g.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',()=>{
    const i=parseInt(b.dataset.i),a=b.dataset.a;
    if(a==='go'){
      for(const[fid,vals] of Object.entries(scenes[i].state))setFix(fid,vals);
      // Update all fader UIs
      for(const[fid,vals] of Object.entries(scenes[i].state)){
        vals.forEach((v,ci)=>{
          const f=document.getElementById('fv-'+fid+'-'+ci);if(f)f.textContent=v;
        });
      }
      toast('Recalled: '+scenes[i].name);
    }else if(a==='upd'){
      scenes[i].state={};PATCH.forEach(p=>scenes[i].state[p.id]=Array.from(ST[p.id]));
      scenes[i].ts=Date.now();saveScenes();renderScenes();toast('Updated');
    }else{scenes.splice(i,1);saveScenes();renderScenes();toast('Deleted');}
  }));
}
document.getElementById('bss').addEventListener('click',()=>{
  const nm=document.getElementById('sinp').value.trim()||'Scene '+(scenes.length+1);
  const state={};PATCH.forEach(p=>state[p.id]=Array.from(ST[p.id]));
  scenes.push({name:nm,ts:Date.now(),state});
  saveScenes();renderScenes();
  document.getElementById('sinp').value='';
  toast('Saved: '+nm);
});

// ─── PATCH PANEL ──────────────────────────────────────────────
function buildPatch(){
  document.getElementById('aip').value=artnetIp;
  const tb=document.getElementById('ptbody');tb.innerHTML='';
  PATCH.forEach((p,i)=>{
    const td=FX[p.type];
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="color:var(--muted2)">${i+1}</td>
      <td style="font-weight:600">${p.label}</td>
      <td style="font-size:11px;color:var(--muted2)">${td.short}</td>
      <td><input class="pi" data-pid="${p.id}" data-f="univ" value="${p.univ}"></td>
      <td><input class="pi" data-pid="${p.id}" data-f="addr" value="${p.addr}"></td>
      <td><select class="ps" data-pid="${p.id}" data-f="mode">
        ${td.modes.map((m,mi)=>`<option value="${mi}"${mi===p.mode?' selected':''}>${m.label}</option>`).join('')}
      </select></td>
      <td style="font-size:10px;color:var(--muted2)">${getChs(p).length}</td>`;
    tb.appendChild(tr);
  });
}
document.getElementById('bans').addEventListener('click',()=>{
  artnetIp=document.getElementById('aip').value.trim();
  ws({type:'config',artnetIp});toast('Art-Net IP saved');
});
document.getElementById('bpa').addEventListener('click',()=>{
  document.querySelectorAll('.pi,.ps').forEach(inp=>{
    const p=PATCH.find(x=>x.id===inp.dataset.pid);if(!p)return;
    const v=parseInt(inp.value);if(!isNaN(v))p[inp.dataset.f]=v;
  });
  PATCH.forEach(p=>{
    const chs=getChs(p),old=ST[p.id]||[];
    const a=new Uint8Array(chs.length);
    chs.forEach((c,i)=>a[i]=old[i]??c.def??0);
    ST[p.id]=a;
  });
  buildPatch();buildFixtures();toast('Patch applied — reload movers/groups if modes changed');
});

// ─── TOAST ────────────────────────────────────────────────────
let tt;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2200);
}

// ─── BOOT ─────────────────────────────────────────────────────
buildGroups();buildMovers();buildFixtures();buildPatch();renderScenes();
</script>
</body>
